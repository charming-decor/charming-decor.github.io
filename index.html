<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charming Decor Portfolio</title>
    <style>
        /* Basic Reset */
        body, h1, p, img {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8; /* Soft light background */
            color: #333; /* Dark text for readability */
            text-align: center;
            line-height: 1.6;
        }

        /* Header Styling */
        header {
            background-color: #4CAF50; /* Green header */
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        /* Container for the main content */
        .container {
            margin: 50px auto;
            padding: 20px;
            max-width: 1200px;
        }

        /* Tiled Image Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* Responsive grid */
            gap: 20px;
            justify-items: center;
        }

        .thumbnail {
            width: 100%;
            height: auto;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .thumbnail:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        /* Modal Styling */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            padding-top: 60px;
        }

        .modal-content {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
        }

        .caption {
            margin: 10px;
            color: white;
            font-size: 18px;
            text-align: center;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #ddd;
        }

        /* Footer Styling */
        footer {
            background-color: #333; /* Dark footer */
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1rem;
            margin-top: 50px;
        }

        footer a {
            color: #fff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<!-- Header -->
<header>
    <h1>Charming Decor Portfolio</h1>
</header>

<!-- Main Content -->
<div class="container">
    <p>Click on any image to view it in full size:</p>

    <!-- Tiled Image Gallery -->
    <div class="gallery">
        <img src="images/image1.jpg" alt="Portfolio Image 1" class="thumbnail" id="myImg1">
        <img src="images/image2.jpg" alt="Portfolio Image 2" class="thumbnail" id="myImg2">
        <img src="images/image3.jpg" alt="Portfolio Image 3" class="thumbnail" id="myImg3">
        <img src="images/image4.jpg" alt="Portfolio Image 4" class="thumbnail" id="myImg4">
        <img src="images/image5.jpg" alt="Portfolio Image 5" class="thumbnail" id="myImg5">
        <img src="images/image6.jpg" alt="Portfolio Image 6" class="thumbnail" id="myImg6">
    </div>

    <!-- The Modal -->
    <div id="myModal" class="modal">
        <!-- Modal Content (Image) -->
        <span class="close" id="closeBtn">&times;</span>
        <img class="modal-content" id="img01">
        <div id="caption" class="caption"></div>
    </div>
</div>

<!-- Footer -->
<footer>
    <p>Charming Decor | <a href="mailto:charming.decor.sneha@gmail.com">Contact Me</a></p>
</footer>

<script>
    // Get the modal
    var modal = document.getElementById("myModal");

    // Get all the image thumbnails
    var images = document.querySelectorAll(".thumbnail");
    var modalImg = document.getElementById("img01");
    var captionText = document.getElementById("caption");

    // Loop through each image and add a click event to open the modal
    images.forEach(function(img) {
        img.onclick = function() {
            modal.style.display = "block";
            modalImg.src = this.src;
            captionText.innerHTML = this.alt;
        };
    });

    // Get the <span> element that closes the modal
    var span = document.getElementById("closeBtn");

    // When the user clicks on <span> (x), close the modal
    span.onclick = function() {
        modal.style.display = "none";
    }

    // Close the modal when the user clicks outside the image
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
